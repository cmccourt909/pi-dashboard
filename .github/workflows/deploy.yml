# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions: Deploy to EC2 on push to main
#
# DISABLED — Migrated to Azure Container Apps (see deploy-azure.yml)
#
# To re-enable, change the 'on' trigger back to:
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
#
# Secrets needed (set in repo Settings → Secrets → Actions):
#   EC2_HOST        — Elastic IP of your server
#   EC2_SSH_KEY     — Private SSH key (contents of ~/.ssh/id_ed25519)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to AWS (disabled)

on:
  workflow_dispatch:  # Manual trigger only — no longer runs on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/pi-dashboard
            ./deploy-prod.sh
