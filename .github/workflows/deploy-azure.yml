# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions: Build & Deploy to Azure Container Apps
#
# Triggers on push to main (or manual dispatch).
# Deploys infrastructure first (including ACR), then builds and pushes images.
#
# Secrets needed (set in repo Settings → Secrets → Actions):
#   AZURE_CREDENTIALS       — Service principal JSON:
#     {"clientId":"...","clientSecret":"...","subscriptionId":"...","tenantId":"..."}
#   DB_ADMIN_PASSWORD       — PostgreSQL admin password
#   UPLOAD_API_KEY          — Backend upload endpoint auth key
#   ANTHROPIC_API_KEY       — (Optional) For AI sync parsing
#
# Variables needed (set in repo Settings → Variables → Actions):
#   AZURE_RESOURCE_GROUP    — Target resource group (e.g. rg-pi-dashboard-uat)
#   AZURE_LOCATION          — Azure region (e.g. uksouth)
#   ENVIRONMENT_NAME        — Environment name (e.g. uat)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'uat'
        type: choice
        options:
          - uat
          - prod
      image_tag:
        description: 'Image tag (leave empty for git SHA)'
        required: false
        type: string

env:
  PROJECT_NAME: pi-dashboard
  ENVIRONMENT_NAME: ${{ github.event.inputs.environment || vars.ENVIRONMENT_NAME || 'uat' }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'uat' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ─── Step 0: Set environment variables ────────────────────────────────
      - name: Set lowercase environment name
        run: |
          echo "ENV_NAME_LOWER=$(echo '${{ env.ENVIRONMENT_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # ─── Step 1: Deploy Infrastructure (creates ACR, DB, Container Apps) ──
      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}-{1}', env.PROJECT_NAME, env.ENVIRONMENT_NAME) }} \
            --location ${{ vars.AZURE_LOCATION || 'uksouth' }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=${{ env.ENVIRONMENT_NAME }}

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}-{1}', env.PROJECT_NAME, env.ENVIRONMENT_NAME) }} \
            --template-file infra/azure/main.bicep \
            --parameters \
              environmentName=${{ env.ENVIRONMENT_NAME }} \
              projectName=${{ env.PROJECT_NAME }} \
              useDefaultImage=true \
              dbAdminPassword='${{ secrets.DB_ADMIN_PASSWORD }}' \
              uploadApiKey='${{ secrets.UPLOAD_API_KEY }}' \
              entraClientId='${{ vars.ENTRA_CLIENT_ID2 }}' \
              entraTenantId='${{ vars.ENTRA_TENANT_ID }}' \
            --query "properties.outputs" \
            --output table

      # ─── Step 2: Build & Push Docker Images ────────────────────────────────
      - name: Get ACR login server
        id: get-acr
        run: |
          ACR_NAME=$(echo "${{ env.PROJECT_NAME }}${{ env.ENV_NAME_LOWER }}acr" | tr -d '-')
          LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "ACR: $LOGIN_SERVER"

      - name: Login to ACR
        run: |
          az acr login --name ${{ steps.get-acr.outputs.acr_name }}

      - name: Build & push backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-backend:${{ env.IMAGE_TAG }} \
            -t ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-backend:latest \
            .
          docker push ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-backend:${{ env.IMAGE_TAG }}
          docker push ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-backend:latest

      - name: Build & push frontend image
        run: |
          docker build \
            -f dashboard/Dockerfile.frontend \
            -t ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-frontend:${{ env.IMAGE_TAG }} \
            -t ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-frontend:latest \
            ./dashboard
          docker push ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-frontend:${{ env.IMAGE_TAG }}
          docker push ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-frontend:latest

      # ─── Step 3: Update Container Apps with new images ─────────────────────
      - name: Update backend container app
        run: |
          az containerapp update \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}-{1}', env.PROJECT_NAME, env.ENVIRONMENT_NAME) }} \
            --name ${{ env.PROJECT_NAME }}-${{ env.ENV_NAME_LOWER }}-backend \
            --image ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-backend:${{ env.IMAGE_TAG }} \
            --output none

      - name: Update frontend container app
        run: |
          az containerapp update \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}-{1}', env.PROJECT_NAME, env.ENVIRONMENT_NAME) }} \
            --name ${{ env.PROJECT_NAME }}-${{ env.ENV_NAME_LOWER }}-frontend \
            --image ${{ steps.get-acr.outputs.login_server }}/pi-dashboard-frontend:${{ env.IMAGE_TAG }} \
            --output none

      # ─── Step 4: Run database migrations ───────────────────────────────────
      - name: Run database migrations
        run: |
          az containerapp exec \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}-{1}', env.PROJECT_NAME, env.ENVIRONMENT_NAME) }} \
            --name ${{ env.PROJECT_NAME }}-${{ env.ENV_NAME_LOWER }}-backend \
            --command "python -m app.models" \
            || echo "Migration may have already been applied or app is still starting"

          az containerapp exec \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}-{1}', env.PROJECT_NAME, env.ENVIRONMENT_NAME) }} \
            --name ${{ env.PROJECT_NAME }}-${{ env.ENV_NAME_LOWER }}-backend \
            --command "python -m app.migrations.add_roadmap_dates" \
            || echo "Roadmap dates migration may have already been applied"

      # ─── Step 5: Output deployment URLs ────────────────────────────────────
      - name: Get deployment URLs
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || format('rg-{0}-{1}', env.PROJECT_NAME, env.ENVIRONMENT_NAME) }} \
            --name ${{ env.PROJECT_NAME }}-${{ env.ENV_NAME_LOWER }}-frontend \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "## Deployment Complete :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | https://$FRONTEND_FQDN |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Auth | Entra ID (${{ vars.ENTRA_CLIENT_ID2 }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag | \`${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ env.ENVIRONMENT_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  Frontend URL: https://$FRONTEND_FQDN"
          echo "  Auth: Entra ID enabled"
          echo "═══════════════════════════════════════════════"
