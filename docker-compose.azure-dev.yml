# ─────────────────────────────────────────────────────────────────────────────
# PI Health Dashboard — Local Development with PostgreSQL
#
# Use this compose file to run locally with PostgreSQL (matching Azure deployment)
# instead of the default SQLite setup.
#
# Usage:
#   docker compose -f docker-compose.azure-dev.yml up -d
#   docker compose -f docker-compose.azure-dev.yml down -v  # Remove volumes too
#
# The backend will be at http://localhost:8000
# The frontend will be at http://localhost:3000
# PostgreSQL will be at localhost:5432
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: pi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pidashboard
      POSTGRES_USER: pidashboardadmin
      POSTGRES_PASSWORD: localdev123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pidashboardadmin -d pidashboard"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pi-backend
    restart: unless-stopped
    environment:
      - DB_URL=postgresql://pidashboardadmin:localdev123@postgres:5432/pidashboard
      - UPLOAD_API_KEY=dev-upload-key
      - CORS_ORIGINS=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=
    container_name: pi-frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
